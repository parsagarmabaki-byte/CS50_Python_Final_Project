version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketwatch-backend
    restart: unless-stopped
    volumes:
      # Persist CSV data
      - csv_data:/app/csv_files
    networks:
      - marketwatch-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Service
  frontend:
    build:
      context: ./web-client
      dockerfile: Dockerfile
      args:
        # Uses SERVER_IP from .env file (default: 192.168.1.100)
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://192.168.1.100:8000}
    container_name: marketwatch-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - marketwatch-network

networks:
  marketwatch-network:
    driver: bridge

volumes:
  csv_data:
    driver: local
