version: '3.8'

services:
  # Backend API Service (Development with hot-reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketwatch-backend-dev
    restart: unless-stopped
    command: uvicorn final_project.web:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Mount code for hot-reload
      - ./final_project:/app/final_project
      - ./requirements.txt:/app/requirements.txt
      # Persist CSV data
      - csv_data:/app/csv_files
    ports:
      - "8000:8000"
    networks:
      - marketwatch-network
    environment:
      - PYTHONUNBUFFERED=1

  # Frontend Web Service (Development with hot-reload)
  frontend:
    build:
      context: ./web-client
      dockerfile: Dockerfile.dev
    container_name: marketwatch-frontend-dev
    restart: unless-stopped
    volumes:
      - ./web-client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - marketwatch-network

networks:
  marketwatch-network:
    driver: bridge

volumes:
  csv_data:
    driver: local
